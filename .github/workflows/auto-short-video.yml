name: Auto Short Video Pipeline

on:
  schedule:
    # 每天6点：抓取热点
    - cron: '0 6 * * *'
    # 每天7点：生成脚本
    - cron: '0 7 * * *'
    # 每天8点：发送日报
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '选择要运行的任务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - crawl-hotspots
          - generate-scripts
          - send-report

env:
  PYTHON_VERSION: '3.10'

jobs:
  # 任务1: 热点抓取
  crawl-hotspots:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 6 * * *' || 
      github.event.inputs.job == 'crawl-hotspots' || 
      github.event.inputs.job == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run hotspot crawler
        env:
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          echo "🚀 开始抓取热点..."
          python scripts/hot_spot_crawler.py
      
      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hotspots-data-${{ github.run_id }}
          path: data/hotspots_*.json
          retention-days: 7

  # 任务2: 脚本生成
  generate-scripts:
    runs-on: ubuntu-latest
    needs: crawl-hotspots
    if: |
      github.event.schedule == '0 7 * * *' || 
      github.event.inputs.job == 'generate-scripts' || 
      github.event.inputs.job == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run script generator
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICON_API_KEY: ${{ secrets.SILICON_API_KEY }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DAILY_GENERATE_LIMIT: ${{ vars.DAILY_GENERATE_LIMIT || '10' }}
        run: |
          echo "🚀 开始生成脚本..."
          python scripts/script_generator.py
      
      - name: Upload script artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scripts-data-${{ github.run_id }}
          path: data/script_*.json
          retention-days: 7

  # 任务3: 发送日报
  send-report:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 8 * * *' || 
      github.event.inputs.job == 'send-report' || 
      github.event.inputs.job == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run data monitor
        env:
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          echo "🚀 开始生成日报..."
          python scripts/data_monitor.py

  # 任务4: 健康检查（每小时运行）
  health-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check system health
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          echo "✅ 系统健康检查通过"
          # 这里可以添加更多健康检查逻辑
